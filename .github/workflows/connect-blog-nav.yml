name: Connect blog navigation and copy

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "blog/**"
      - ".github/workflows/connect-blog-nav.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Blog link and polish homepage copy
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")

          nav_target = '        <a href="/support/">Contact us</a>'
          nav_insert = '        <a href="/blog/">Blog</a>\n        <a href="/support/">Contact us</a>'
          if 'href="/blog/"' not in html and nav_target in html:
              html = html.replace(nav_target, nav_insert, 1)
              print("Blog link added to homepage navigation.")

          replacements = {
              '<title>Answerable Faith</title>': '<title>Answerable Faith | Practise Christian Apologetics with Grace</title>',
              'Answerable Faith helps Christians practise clear, gracious answers through focused questions, model answers, Scripture-led study and realistic conversation partners.': 'Answerable Faith helps regular Christians and evangelical groups practise clear, gracious answers with app-based questions, model responses, Scripture-led study and realistic conversation partners.',
              '<p class="eyebrow">Christian apologetics trainer</p>': '<p class="eyebrow">Christian apologetics training app</p>',
              '<h1>One question at a time</h1>': '<h1>Practise the answer before the conversation</h1>',
              'Answerable helps Christians practise clear, gracious answers through focused questions,\n          model answers, Scripture-led study and realistic conversation partners.': 'Answerable helps regular Christians, small groups and evangelical teams prepare for hard questions with model answers, Scripture-led study and realistic conversation practice.',
              '<span>Guided practice</span>\n          <span>Conversation training</span>\n          <span>Scripture-led study</span>': '<span>App-based practice</span>\n          <span>Gracious conversation training</span>\n          <span>Scripture-led study</span>',
              'Read context, form an answer, then compare it with a model response.': 'Read the question, form an answer, then compare it with a careful model response.',
              '<h2>How it works</h2>\n          <p>Practise the flow you want in real conversations: draw a question, answer before peeking, then review with Scripture and a model response.</p>': '<h2>How the training works</h2>\n          <p>Practise the flow you want in real conversations: face a real question, answer before peeking, then review with Scripture, context and a model response.</p>',
              '<article class="step"><span>1</span><h3>Draw</h3><p>Start with a real apologetics question across key topics.</p></article>': '<article class="step"><span>1</span><h3>Face a question</h3><p>Start with a real apologetics question across doctrine, Scripture, ethics, philosophy and evangelism.</p></article>',
              '<article class="step"><span>2</span><h3>Answer</h3><p>Practise forming a clear answer before revealing the model response.</p></article>': '<article class="step"><span>2</span><h3>Try your answer</h3><p>Form your own response before you reveal the model answer.</p></article>',
              '<article class="step"><span>3</span><h3>Review</h3><p>Return to Scripture, strengthen the answer and save what you learn.</p></article>': '<article class="step"><span>3</span><h3>Review with care</h3><p>Return to Scripture, strengthen the answer and learn how to say it with grace.</p></article>',
              '<p>Sharpen your answers with focused questions, helpful context and model responses grounded in Scripture and reason.</p>': '<p>Practise focused questions with helpful context and model responses drawn from the app’s apologetics training.</p>',
              '<li>Topical questions that matter</li>\n                <li>Answer before you read</li>\n                <li>Compare with model responses</li>\n                <li>Return to Scripture with clarity</li>': '<li>Questions regular Christians actually face</li>\n                <li>Answer before you read</li>\n                <li>Compare with model responses</li>\n                <li>Return to Scripture with clarity</li>',
              '<p>Practise with people, not just prompts. Choose partners with different beliefs, temperaments and objections.</p>': '<p>Practise with realistic conversation partners, not just prompts. Prepare for different beliefs, temperaments and objections.</p>',
              '<li>Prepare for realistic conversations</li>\n                <li>Respond with patience and clarity</li>\n                <li>Learn without trying to win arguments</li>\n                <li>Build confidence to love and speak well</li>': '<li>Prepare for realistic conversations</li>\n                <li>Respond with patience and clarity</li>\n                <li>Avoid trying to win arguments</li>\n                <li>Build confidence to love and speak well</li>',
              '<h2>Inside Answerable</h2>\n          <p>Real app screens for Home, Practice, Partners, Scripture Study, Library and Test Yourself.</p>': '<h2>Inside the app</h2>\n          <p>Real app screens for Home, Practice, Partners, Scripture Study, Library and Test Yourself.</p>',
              '<h2>Take Answerable Faith with you</h2>\n            <p>Practise your next answer wherever you are. The iOS and Android links are ready to be connected when the store pages are live.</p>': '<h2>Take Answerable Faith with you</h2>\n            <p>Practise your next answer wherever you are. The iOS and Android links will be connected when the store pages are live.</p>',
              '<h2>Built to help Christians respond with clarity, patience and grace — not to win arguments.</h2>\n            <p>Answerable is built around conviction and gentleness: biblically grounded answers, emotionally careful posture and language people can understand.</p>': '<h2>Built to help Christians answer with clarity, patience and grace — not to win arguments.</h2>\n            <p>Answerable is built around conviction and gentleness: careful answers, Scripture-led study, emotionally aware posture and language people can understand.</p>',
              '<h2>Frequently asked questions</h2>\n          <p>Quick answers for visitors deciding whether Answerable Faith is for them.</p>': '<h2>Frequently asked questions</h2>\n          <p>Quick answers for Christians, churches and groups deciding whether Answerable Faith is for them.</p>',
              '<details><summary>What is Answerable Faith?</summary><p>A Christian apologetics trainer for practising thoughtful, Scripture-led answers to real questions.</p></details>': '<details><summary>What is Answerable Faith?</summary><p>A Christian apologetics training app for practising thoughtful, Scripture-led answers to real questions.</p></details>',
              '<details><summary>Who is it for?</summary><p>Christians who want to grow in confidence, clarity and grace when talking with friends, family, students or seekers.</p></details>': '<details><summary>Who is it for?</summary><p>Regular Christians, evangelical groups, small groups, youth and student ministries, and churches that want to answer with confidence and grace.</p></details>',
              '<details><summary>How do conversation partners work?</summary><p>Partners represent different beliefs, temperaments and objections so you can prepare for realistic conversations.</p></details>': '<details><summary>How do conversation partners work?</summary><p>Partners represent different beliefs, temperaments and objections so you can practise realistic conversations before they happen.</p></details>',
              '<h2>Ready to practise your next answer?</h2>\n            <p>Start with a real question, form your answer, and learn from a model response grounded in Scripture and reason.</p>': '<h2>Ready to practise your next answer?</h2>\n            <p>Start with a real question, form your answer, and learn from a model response shaped by Scripture, reason and gracious posture.</p>',
              '<h2>Contact us</h2>\n            <p>For app support, feedback or issue reports, email us directly or open the contact page.</p>': '<h2>Contact us</h2>\n            <p>For app support, church or group questions, feedback or issue reports, email us directly or open the contact page.</p>',
          }

          for old, new in replacements.items():
              if old in html:
                  html = html.replace(old, new)
              else:
                  print(f"Skipped missing copy block: {old[:70]}")

          path.write_text(html, encoding="utf-8")
          PY

      - name: Commit homepage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No homepage changes to commit."
          else
            git commit -m "Polish homepage copy for Answerable method"
            git push
          fi
