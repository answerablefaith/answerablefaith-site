name: Remove statement card icon

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/remove-statement-icon.yml"

permissions:
  contents: write

jobs:
  remove-icon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove icon from statement card
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          text = text.replace(
'''    .statement {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: center;
      padding: clamp(22px, 3.2vw, 34px);
      background: var(--navy);
      color: white;
    }''',
'''    .statement {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: center;
      padding: clamp(22px, 3.2vw, 34px);
      background: var(--navy);
      color: white;
    }''')

          text = text.replace(
'''          <div class="statement-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <path d="M28 4h8v16h14v8H36v32h-8V28H14v-8h14V4z" fill="currentColor"></path>
            </svg>
          </div>
''',
'''          ''')

          workflow = Path(".github/workflows/remove-statement-icon.yml")
          workflow.unlink(missing_ok=True)

          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html .github/workflows/remove-statement-icon.yml
            git commit -m "Remove icon from statement card"
            git push
          fi
