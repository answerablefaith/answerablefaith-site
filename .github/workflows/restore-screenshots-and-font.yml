name: Restore screenshots and heading font

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/restore-screenshots-and-font.yml"

permissions:
  contents: write

jobs:
  restore-homepage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore previous screenshot-based homepage
        run: |
          git checkout da4dcb9c6db65cf820204eb36983da68a97a1b30 -- index.html
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          # Keep the user's preferred previous typography and screenshot sections,
          # while preserving the newer public-facing "Contact us" wording.
          text = text.replace('<a href="/support/">Support</a>', '<a href="/support/">Contact us</a>')
          text = text.replace('<a class="button secondary" href="/support/">Support</a>', '<a class="button secondary" href="/support/">Contact us</a>')
          text = text.replace('Support email', 'Contact email')
          text = text.replace('<h2>Support</h2>', '<h2>Contact us</h2>')
          text = text.replace('For app support, feedback or issue reports, email us directly or open the support page.', 'For app support, feedback, or issue reports, email us directly or open the contact page.')
          text = text.replace('Open support page', 'Open contact page')

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/restore-screenshots-and-font.yml").unlink(missing_ok=True)
          PY
      - name: Commit restored homepage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html .github/workflows/restore-screenshots-and-font.yml
            git commit -m "Restore homepage screenshots and previous heading font"
            git push
          fi
