name: Enlarge header brand

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/enlarge-header-brand.yml"

permissions:
  contents: write

jobs:
  update-header-brand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add consistent header brand sizing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          override = '''

    /* Larger, more readable header brand across all pages */
    .nav {
      min-height: 88px;
    }

    .brand {
      font-size: 24px;
      gap: 14px;
      line-height: 1;
    }

    .logo {
      width: 44px;
      height: 44px;
    }

    .logo img {
      width: 38px;
      height: 38px;
    }

    @media (max-width: 640px) {
      .brand {
        font-size: 22px;
        gap: 12px;
      }

      .logo {
        width: 40px;
        height: 40px;
      }

      .logo img {
        width: 34px;
        height: 34px;
      }
    }
'''

          for filename in ["index.html", "support/index.html", "privacy/index.html", "terms/index.html"]:
            path = Path(filename)
            text = path.read_text(encoding="utf-8")
            marker = "/* Larger, more readable header brand across all pages */"
            if marker in text:
              continue
            text = text.replace("\n  </style>", override + "\n  </style>")
            path.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/enlarge-header-brand.yml")
          workflow.unlink(missing_ok=True)
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html support/index.html privacy/index.html terms/index.html .github/workflows/enlarge-header-brand.yml
            git commit -m "Enlarge header brand across pages"
            git push
          fi
