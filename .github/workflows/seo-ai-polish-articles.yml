name: SEO and AI polish articles

on:
  push:
    branches: ["main"]
    paths:
      - "blog/**/index.html"
      - "app-source-notes.md"
      - ".github/workflows/seo-ai-polish-articles.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add AI-search summaries and related links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          articles = {
              "blog/is-the-trinity-a-contradiction/index.html": {
                  "answer": [
                      "Christianity does not claim God is one person and three persons in the same sense.",
                      "The Answerable app’s key distinction is one being and three persons.",
                      "Mystery is not the same as logical contradiction."
                  ],
                  "faq": [
                      ("Is the Trinity a contradiction?", "No. A contradiction would be saying God is one person and three persons in the same sense. The app frames the Christian claim as one being and three persons."),
                      ("What is the key distinction?", "The key distinction is being and person. Christianity says God is one in being and three in person."),
                      ("How should I say this gently?", "You can say that mystery is not the same as contradiction, and that Christians are not claiming one God and three gods.")
                  ],
                  "related": [
                      ("Did scribes change the New Testament?", "/blog/did-scribes-change-the-new-testament/"),
                      ("Could the disciples have hallucinated Jesus?", "/blog/could-the-disciples-have-hallucinated-jesus/"),
                      ("How should Christians answer slavery in the Bible?", "/blog/how-should-christians-answer-slavery-in-the-bible/")
                  ]
              },
              "blog/did-scribes-change-the-new-testament/index.html": {
                  "answer": [
                      "Scribes did make copying mistakes, and Christians should not deny that.",
                      "The Answerable app’s key point is that variants are not the same as losing the text.",
                      "The manuscript differences are visible because copies can be compared."
                  ],
                  "faq": [
                      ("Did scribes change the New Testament?", "Scribes made mistakes and occasional changes, but the article follows the app in distinguishing variants from corruption."),
                      ("Do variants mean the New Testament text was lost?", "No. The app says variants are the evidence by which the text can be examined."),
                      ("Do major Christian doctrines depend on disputed readings?", "The app’s careful claim is that major Christian doctrines do not depend on disputed readings.")
                  ],
                  "related": [
                      ("Is the Trinity a contradiction?", "/blog/is-the-trinity-a-contradiction/"),
                      ("Could the disciples have hallucinated Jesus?", "/blog/could-the-disciples-have-hallucinated-jesus/"),
                      ("How should Christians answer slavery in the Bible?", "/blog/how-should-christians-answer-slavery-in-the-bible/")
                  ]
              },
              "blog/could-the-disciples-have-hallucinated-jesus/index.html": {
                  "answer": [
                      "The app does not deny that grief experiences can happen.",
                      "The question is whether hallucination explains the whole resurrection witness.",
                      "Answerable points to group testimony, physical interaction, an empty tomb and a transformed public movement."
                  ],
                  "faq": [
                      ("Could the disciples have hallucinated Jesus?", "The article follows the app in saying hallucination does not explain the whole resurrection witness."),
                      ("Does Answerable deny grief experiences?", "No. The app warns against the weak answer that hallucinations simply do not happen."),
                      ("What is the key issue?", "The key issue is whether hallucination explains group testimony, bodily claims, the empty tomb and the public movement that followed.")
                  ],
                  "related": [
                      ("Did scribes change the New Testament?", "/blog/did-scribes-change-the-new-testament/"),
                      ("Is the Trinity a contradiction?", "/blog/is-the-trinity-a-contradiction/"),
                      ("How should Christians answer slavery in the Bible?", "/blog/how-should-christians-answer-slavery-in-the-bible/")
                  ]
              },
              "blog/how-should-christians-answer-slavery-in-the-bible/index.html": {
                  "answer": [
                      "Christians should begin with moral clarity, not defensiveness.",
                      "The app says humans made in God’s image must never be treated as property.",
                      "Regulation is not the same as moral endorsement, but the question still deserves careful handling."
                  ],
                  "faq": [
                      ("How should Christians answer slavery in the Bible?", "Begin with moral clarity. The app says humans made in God’s image must never be treated as property."),
                      ("Does regulation mean approval?", "No. The app’s strong answer says regulation is not the same as moral endorsement."),
                      ("Should Christians condemn chattel slavery?", "Yes. The app says Christians should plainly condemn race-based chattel slavery as sin.")
                  ],
                  "related": [
                      ("Did scribes change the New Testament?", "/blog/did-scribes-change-the-new-testament/"),
                      ("Could the disciples have hallucinated Jesus?", "/blog/could-the-disciples-have-hallucinated-jesus/"),
                      ("Is the Trinity a contradiction?", "/blog/is-the-trinity-a-contradiction/")
                  ]
              }
          }

          def summary_block(points):
              lis = "\n".join(f"          <li>{p}</li>" for p in points)
              return f'''\n        <!-- seo-ai-summary -->\n        <div class="app-card" aria-labelledby="answer-in-brief">\n          <strong id="answer-in-brief">Answer in brief</strong>\n          <ul>\n{lis}\n          </ul>\n        </div>\n'''

          def related_block(items):
              links = "\n".join(f'          <li><a href="{url}">{title}</a></li>' for title, url in items)
              return f'''\n        <!-- related-articles -->\n        <section aria-labelledby="related-articles-heading">\n          <h2 id="related-articles-heading">Related Answerable articles</h2>\n          <ul>\n{links}\n          </ul>\n        </section>\n'''

          def faq_schema(faq):
              data = {
                  "@context": "https://schema.org",
                  "@type": "FAQPage",
                  "mainEntity": [
                      {
                          "@type": "Question",
                          "name": q,
                          "acceptedAnswer": {"@type": "Answer", "text": a}
                      }
                      for q, a in faq
                  ]
              }
              return '\n  <script type="application/ld+json" data-faq-schema>\n' + json.dumps(data, ensure_ascii=False, indent=2) + '\n  </script>\n'

          changed = False
          for file_name, data in articles.items():
              path = Path(file_name)
              html = path.read_text(encoding="utf-8")
              original = html

              if '<!-- seo-ai-summary -->' not in html:
                  marker = '<p>The Answerable app'
                  idx = html.find(marker)
                  if idx != -1:
                      html = html[:idx] + summary_block(data["answer"]) + "\n        " + html[idx:]

              if '<!-- related-articles -->' not in html:
                  marker = '        <div class="cta-box">'
                  if marker in html:
                      html = html.replace(marker, related_block(data["related"]) + "\n" + marker, 1)

              if 'data-faq-schema' not in html:
                  html = html.replace('</head>', faq_schema(data["faq"]) + '</head>', 1)

              if html != original:
                  path.write_text(html, encoding="utf-8")
                  changed = True
                  print(f"Polished {file_name}")
              else:
                  print(f"No changes for {file_name}")

          if not changed:
              print("All articles already polished.")
          PY

      - name: Commit SEO polish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog
          if git diff --cached --quiet; then
            echo "No SEO article changes to commit."
          else
            git commit -m "Polish articles for SEO and AI search"
            git push
          fi
