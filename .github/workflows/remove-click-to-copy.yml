name: Remove click to copy wording

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/remove-click-to-copy.yml"

permissions:
  contents: write

jobs:
  update-copy-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove default copy helper text
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          text = text.replace('<span class="copy-note" id="copyNote">Click to copy.</span>', '<span class="copy-note" id="copyNote" aria-live="polite"></span>')
          path.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/remove-click-to-copy.yml")
          workflow.unlink(missing_ok=True)
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html .github/workflows/remove-click-to-copy.yml
            git commit -m "Remove copy helper wording"
            git push
          fi
